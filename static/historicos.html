<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Históricos</title>
  <link rel="stylesheet" href="/static/assets/css/main.css" />
  <style>
    body {
      padding-top: 24px;
      background: linear-gradient(135deg, #07111f 0%, #111c2f 45%, #1b2d3f 100%);
      color: #f8fafc;
    }
    .panel {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      vertical-align: top;
    }
    th {
      color: #7dd3fc;
      font-weight: 700;
    }
    .muted {
      color: #cbd5e1;
      font-size: 0.9rem;
    }
    .button {
      display: inline-block;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 736px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.12); }
      td { border: 0; padding: 4px 0; }
      td:before {
        content: attr(data-label);
        font-weight: 700;
        color: #7dd3fc;
        display: block;
        margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="toolbar">
      <h1>Históricos</h1>
      <a class="button" href="/">Volver al inicio</a>
    </div>
    <p class="muted">Últimos eventos registrados por el sistema.</p>
    <table id="historicos-table">
      <thead>
        <tr>
          <th>Fecha / hora</th>
          <th>Tipo</th>
          <th>Evento</th>
          <th>Origen</th>
          <th>Detalle</th>
        </tr>
      </thead>
      <tbody id="historicos-body">
        <tr><td colspan="5">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function cargarHistoricos() {
      try {
        const response = await fetch('/api/historicos?limit=100');
        const data = await response.json();
        const body = document.getElementById('historicos-body');
        if (!data.ok || !Array.isArray(data.eventos) || data.eventos.length === 0) {
          body.innerHTML = '<tr><td colspan="5">No hay eventos registrados aún.</td></tr>';
          return;
        }

        body.innerHTML = data.eventos.map(item => `
          <tr>
            <td data-label="Fecha / hora">${item.timestamp || '-'}</td>
            <td data-label="Tipo">${item.tipo || '-'}</td>
            <td data-label="Evento">${item.evento || '-'}</td>
            <td data-label="Origen">${item.origen || '-'}</td>
            <td data-label="Detalle">${item.detalle || '-'}</td>
          </tr>
        `).join('');
      } catch (error) {
        document.getElementById('historicos-body').innerHTML = '<tr><td colspan="5">No se pudieron cargar los eventos.</td></tr>';
      }
    }

    cargarHistoricos();
  </script>
</body>
</html>
